<body>
  <div class="page">
    <h1>Assista ao tutorial: como pagar a taxa de validação</h1>

    <div class="video-wrap">
      <iframe
        id="panda-a779e129-7edf-4f40-bbdd-a64a94f17447"
        src="https://player-vz-76897f8f-6f3.tv.pandavideo.com/embed/?v=a779e129-7edf-4f40-bbdd-a64a94f17447"
        style="border:none;"
        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture"
        allowfullscreen
        width="720"
        height="360"
        fetchpriority="high"
      ></iframe>
    </div>

    <p class="msg-assista" id="msg-assista">Assista o vídeo até ao fim para liberar o botão de pagamento.</p>

    <div class="btn-wrap" id="btn-wrap">
      <a
        id="btn-pagar"
        href="https://www.kintu.org/product/38cc91de-b32b-4427-ad11-7eb6995290c8"
        class="btn-pagar"
      >PAGAR A TAXA</a>
    </div>
  </div>

  <script>
    (function() {
      var CHECKOUT_BASE = 'https://www.kintu.org/product/38cc91de-b32b-4427-ad11-7eb6995290c8';
      var btnWrap = document.getElementById('btn-wrap');
      var msgAssista = document.getElementById('msg-assista');
      var btnPagar = document.getElementById('btn-pagar');

      function getUtmParams() {
        var params = {};
        var search = window.location.search;
        if (search) {
          search.slice(1).split('&').forEach(function(pair) {
            var i = pair.indexOf('=');
            if (i > 0) params[decodeURIComponent(pair.slice(0,i))] = decodeURIComponent(pair.slice(i+1));
          });
        }
        var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
        try {
          utmKeys.forEach(function(k) {
            if (params[k]) return;
            var v = localStorage.getItem(k) || localStorage.getItem('utmify_' + k);
            if (v) params[k] = v;
          });
          var c = document.cookie || '';
          c.split(';').forEach(function(s) {
            var p = s.trim().split('=');
            var key = decodeURIComponent(p[0]).trim();
            if (utmKeys.indexOf(key) >= 0 && p[1] && !params[key]) params[key] = decodeURIComponent(p[1]).trim();
          });
        } catch (e) {}
        return params;
      }

      function buildCheckoutUrl() {
        var url = CHECKOUT_BASE;
        var utm = getUtmParams();
        var keys = Object.keys(utm);
        if (keys.length) {
          var sep = url.indexOf('?') >= 0 ? '&' : '?';
          url += sep + keys.map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(utm[k]); }).join('&');
        }
        return url;
      }

      function showButton() {
        btnWrap.classList.add('visible');
        if (msgAssista) msgAssista.style.display = 'none';
      }

      if (btnPagar) {
        btnPagar.addEventListener('click', function(e) {
          e.preventDefault();
          window.location.href = buildCheckoutUrl();
        }, false);
      }

      window.addEventListener('message', function(event) {
        var data = event.data;
        if (data == null) return;
        if (typeof data === 'string') {
          try { data = JSON.parse(data); } catch (e) {}
        }
        var msg = typeof data === 'object' ? (data.message || data.event || data.type || data.name) : data;
        if (msg === 'panda_ended' || msg === 'ended' || msg === 'complete') {
          showButton();
        }
      }, false);
    })();
  </script>
  <!-- UTMify Pixel Code -->
  <script>
