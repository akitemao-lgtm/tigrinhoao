  <script>
    (function() {
      var CHECKOUT_BASE = 'https://www.kintu.org/product/38cc91de-b32b-4427-ad11-7eb6995290c8';
      var btnWrap = document.getElementById('btn-wrap');
      var msgAssista = document.getElementById('msg-assista');
      var btnPagar = document.getElementById('btn-pagar');

      var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];

      function isSafeUtmValue(val) {
        if (typeof val !== 'string' || val.length > 256) return false;
        if (/^\s*https?:\/\//i.test(val) || val.indexOf('://') >= 0) return false;
        if (/^[\w\s\-\.]+$/.test(val)) return true;
        return /^[^\s<>\"\']+$/.test(val);
      }

      function getUtmParams() {
        var params = {};
        var search = window.location.search;
        if (search) {
          search.slice(1).split('&').forEach(function(pair) {
            var i = pair.indexOf('=');
            if (i > 0) {
              var k = decodeURIComponent(pair.slice(0,i)).trim();
              var v = decodeURIComponent(pair.slice(i+1)).trim();
              if (UTM_KEYS.indexOf(k) >= 0 && isSafeUtmValue(v)) params[k] = v;
            }
          });
        }
        try {
          UTM_KEYS.forEach(function(k) {
            if (params[k]) return;
            var v = localStorage.getItem(k) || localStorage.getItem('utmify_' + k);
            if (v && isSafeUtmValue(v)) params[k] = v;
          });
          var c = document.cookie || '';
          c.split(';').forEach(function(s) {
            var p = s.trim().split('=');
            var key = decodeURIComponent((p[0]||'').trim());
            var val = decodeURIComponent((p[1]||'').trim());
            if (UTM_KEYS.indexOf(key) >= 0 && !params[key] && isSafeUtmValue(val)) params[key] = val;
          });
        } catch (e) {}
        return params;
      }

      function buildCheckoutUrl() {
        var base = CHECKOUT_BASE;
        var utm = getUtmParams();
        var keys = Object.keys(utm);
        if (keys.length === 0) return base;
        var sep = base.indexOf('?') >= 0 ? '&' : '?';
        var qs = keys.map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(utm[k]); }).join('&');
        return base + sep + qs;
      }

      function showButton() {
        btnWrap.classList.add('visible');
        if (msgAssista) msgAssista.style.display = 'none';
      }

      if (btnPagar) {
        btnPagar.addEventListener('click', function(e) {
          e.preventDefault();
          window.location.href = buildCheckoutUrl();
        }, false);
      }

      setTimeout(showButton, 2 * 60 * 1000);
    })();
  </script>
