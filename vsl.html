<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assista ao vídeo - Receba o seu pagamento</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(139,10,10,0.6) 50%, rgba(0,0,0,0.85) 100%);
      background-color: #0a0a0a;
      color: #e8e8e8;
      font-family: ui-sans-serif, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .vsl-box {
      width: 100%;
      max-width: 800px;
      background: linear-gradient(180deg, rgba(20,25,35,0.95), rgba(15,18,25,0.97));
      border: 1px solid rgba(100,120,140,0.2);
      border-radius: 1rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      padding: 1.5rem;
      text-align: center;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 1.5rem;
      color: #FFC106;
      font-family: 'Russo One', sans-serif;
    }
    .video-wrap {
      width: 100%;
      margin: 0 auto 1.5rem;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #000;
      position: relative;
      aspect-ratio: 720/360;
    }
    .video-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .btn-wrap {
      display: none;
    }
    .btn-wrap.visible {
      display: block;
    }
    .btn-pagar {
      display: inline-block;
      width: 100%;
      max-width: 400px;
      padding: 14px 35px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      background: linear-gradient(135deg, #FFD700, #DAA520, #FF8C00);
      color: #1a0505;
      font-family: 'Russo One', sans-serif;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .btn-pagar:hover {
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="vsl-box">
    <h1>ASSISTA ESTE VIDEO PRA SABER COMO RECEBER O SEU PAGAMENTO</h1>

    <div class="video-wrap">
      <iframe
        id="panda-895afce6-44be-42cd-bf10-494f5daf2f35"
        src="https://player-vz-76897f8f-6f3.tv.pandavideo.com/embed/?v=895afce6-44be-42cd-bf10-494f5daf2f35"
        style="border:none;"
        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture"
        allowfullscreen
        width="720"
        height="360"
        fetchpriority="high"
      ></iframe>
    </div>

    <div class="btn-wrap" id="btn-wrap">
      <a href="pagar-taxa.html" class="btn-pagar" id="btn-pagar">PAGAR A TAXA AGORA</a>
    </div>
  </div>

  <script>
    (function() {
      var btnWrap = document.getElementById('btn-wrap');
      var delayMs = 6 * 60 * 1000;
      setTimeout(function() {
        if (btnWrap) btnWrap.classList.add('visible');
      }, delayMs);
    })();
  </script>
</body>
</html>
